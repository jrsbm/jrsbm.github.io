<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFFC 2026 Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Session Configuration
        const SESSIONS = [
            { id: 'RT', name: 'Round Table: Good Practices', time: '11:00-12:30' },
            { id: 'ER1', name: 'Escape Room: Session 1', time: '11:00-11:45' },
            { id: 'ML', name: 'Mini Lab: DNA Testing', time: '13:30-15:15' }
        ];

        function App() {
            const [name, setName] = useState('');
            const [selectedSession, setSelectedSession] = useState('');
            const [submitted, setSubmitted] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                
                // --- GOOGLE FORMS TRICK ---
                // 1. Create a Google Form with 2 short answer questions: "Name" and "Session".
                // 2. Get the Form ID and the entry IDs (inspect the form source code).
                // 3. Replace the placeholder values below.
                
                const formURL = "https://docs.google.com/forms/d/e/1N-2zC6eLCSzBQVH7eXL2X9iIEQva8P6WCVjGAgxPi2U/formResponse";
                const formData = new FormData();
                formData.append("entry.833138610", name);
                formData.append("entry.1518662940", selectedSession);

                // Silently send the data
                fetch(formURL, {
                    method: "POST",
                    mode: "no-cors",
                    body: formData
                }).then(() => {
                    setSubmitted(true);
                }).catch(() => {
                    // Fallback to success even if CORS blocks the response, 
                    // as Google Forms usually accepts the data anyway
                    setSubmitted(true);
                });
            };

            if (submitted) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 text-center">
                        <div className="bg-white p-8 rounded-3xl shadow-xl border border-green-100 max-w-sm">
                            <div className="text-green-500 text-5xl mb-4 text-center flex justify-center">
                                <svg className="w-16 h-16" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24">
                                    <path d="M20 6L9 17l-5-5"></path>
                                </svg>
                            </div>
                            <h2 className="text-2xl font-bold mb-2">Thanks, {name}!</h2>
                            <p className="text-gray-500">Your registration for <strong>{selectedSession}</strong> has been received.</p>
                            <button onClick={() => window.location.reload()} className="mt-6 text-blue-600 underline">Register another person</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto py-12 px-6">
                    <div className="bg-white p-8 rounded-3xl shadow-lg border border-gray-100">
                        <h1 className="text-2xl font-black text-gray-900 uppercase tracking-tighter mb-6">
                            AFFC <span className="text-amber-600">Register</span>
                        </h1>
                        
                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div>
                                <label className="block text-xs font-bold uppercase text-gray-400 mb-2 tracking-widest">Full Name</label>
                                <input 
                                    required 
                                    className="w-full p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 ring-amber-500 outline-none"
                                    value={name}
                                    onChange={(e) => setName(e.target.value)}
                                    placeholder="e.g. John Doe"
                                />
                            </div>

                            <div>
                                <label className="block text-xs font-bold uppercase text-gray-400 mb-2 tracking-widest">Select Session</label>
                                <div className="space-y-2">
                                    {SESSIONS.map(s => (
                                        <label key={s.id} className={`flex items-center p-4 rounded-2xl border-2 transition-all cursor-pointer ${selectedSession === s.name ? 'border-amber-500 bg-amber-50' : 'border-gray-100 bg-white hover:border-gray-200'}`}>
                                            <input 
                                                type="radio" 
                                                name="session" 
                                                className="hidden" 
                                                onChange={() => setSelectedSession(s.name)}
                                                required
                                            />
                                            <div className="flex-1">
                                                <div className="font-bold text-sm text-gray-800">{s.name}</div>
                                                <div className="text-xs text-gray-400">{s.time}</div>
                                            </div>
                                            {selectedSession === s.name && <div className="text-amber-600 font-bold">✓</div>}
                                        </label>
                                    ))}
                                </div>
                            </div>

                            <button 
                                type="submit" 
                                className="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-black transition-all uppercase tracking-widest text-xs"
                            >
                                Confirm Registration
                            </button>
                        </form>
                    </div>
                    <p className="text-center text-gray-400 text-[10px] mt-8 uppercase tracking-widest">Dublin Conference 2026</p>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
