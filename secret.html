
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-sans); }
  .nav-top { display: flex; align-items: center; justify-content: space-between; padding: 12px 28px; border-bottom: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); }
  .logo { font-size: 22px; font-weight: 500; color: #1a9fd4; letter-spacing: -0.5px; }
  .logo span { color: #1a9fd4; }
  .nav-links { display: flex; flex-wrap: wrap; gap: 8px 20px; justify-content: flex-end; }
  .nav-links a { font-size: 13px; font-weight: 500; color: #1a9fd4; text-decoration: none; }
  .nav-links a:hover { text-decoration: underline; }
  .nav-bar2 { display: flex; align-items: center; justify-content: space-between; padding: 8px 28px; background: #1a9fd4; }
  .nav-bar2 .login { display: flex; align-items: center; gap: 8px; color: #fff; font-size: 13px; font-weight: 500; }
  .search-box { display: flex; align-items: center; gap: 8px; background: #fff; border-radius: 20px; padding: 5px 14px; }
  .search-box input { border: none; outline: none; font-size: 13px; color: #555; background: transparent; width: 160px; }
  .hero { display: grid; grid-template-columns: 1fr 1fr; min-height: 280px; }
  .hero-left { background: #8dc63f; display: flex; align-items: center; justify-content: center; }
  .hero-photo { width: 100%; height: 280px; background: linear-gradient(135deg, #8dc63f 60%, #6faa20 100%); display: flex; align-items: center; justify-content: center; }
  .people-placeholder { display: flex; gap: -8px; }
  .person { width: 56px; height: 56px; border-radius: 50%; background: rgba(255,255,255,0.25); border: 2px solid rgba(255,255,255,0.4); }
  .hero-right { background: #1a9fd4; display: flex; flex-direction: column; justify-content: center; padding: 40px 36px; }
  .hero-right .tagline { font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.85); margin-bottom: 8px; }
  .hero-right .title { font-size: 44px; font-weight: 700; color: #fff; letter-spacing: -1px; line-height: 1; }
  .chat-btn { position: absolute; bottom: 24px; right: 24px; background: #8dc63f; color: #fff; border-radius: 24px; padding: 10px 18px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .hero-wrap { position: relative; }
  .edit-hint { font-size: 12px; color: var(--color-text-secondary); padding: 10px 28px 6px; }
  .section-label { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); letter-spacing: 0.5px; text-transform: uppercase; padding: 6px 28px 2px; }
</style>

<div style="border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden;">

  <div class="nav-top">
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="logo">E<span style="font-size:18px;vertical-align:2px;">🔍</span>F-HUB</div>
      <div style="width:36px;height:36px;opacity:0.5;">
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8" cy="10" r="3" fill="#e44" opacity="0.7"/>
          <circle cx="18" cy="6" r="3" fill="#4a4" opacity="0.7"/>
          <circle cx="28" cy="12" r="3" fill="#44e" opacity="0.7"/>
          <circle cx="12" cy="22" r="3" fill="#ea4" opacity="0.7"/>
          <circle cx="24" cy="20" r="3" fill="#e4a" opacity="0.7"/>
        </svg>
      </div>
    </div>
    <div class="nav-links">
      <a href="#">Ambassadors HUB</a>
      <a href="#">Resources</a>
      <a href="#">Events</a>
      <a href="#">Training</a>
      <a href="#">Communication</a>
      <a href="#">Forum</a>
      <a href="#">Feedback</a>
      <a href="#">EFF-CoP</a>
    </div>
  </div>

  <div class="nav-bar2">
    <div class="login">
      <i class="ti ti-user-circle" style="font-size:20px;" aria-hidden="true"></i>
      Register / Log In
    </div>
    <div class="search-box">
      <input type="text" placeholder="re-search" />
      <i class="ti ti-search" style="font-size:16px; color:#888;" aria-hidden="true"></i>
    </div>
  </div>

  <div class="hero-wrap">
    <div class="hero">
      <div class="hero-photo">
        <div style="display:flex;gap:12px;opacity:0.6;">
          <div class="person" style="margin-top:20px;"></div>
          <div class="person" style="margin-top:0;width:72px;height:72px;"></div>
          <div class="person" style="margin-top:30px;"></div>
        </div>
      </div>
      <div class="hero-right">
        <div class="tagline">Innovation in progress</div>
        <div class="title">EFF-HUB</div>
        <div style="margin-top:20px;">
          <button onclick="sendPrompt('Help me redesign the EFF-HUB hero section with a new tagline and layout')" style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:#fff;border-radius:20px;padding:7px 16px;font-size:12px;cursor:pointer;">Redesign hero ↗</button>
        </div>
      </div>
    </div>
    <div class="chat-btn">
      <i class="ti ti-message" aria-hidden="true"></i> Let's Chat!
    </div>
  </div>

</div>

<div style="padding: 12px 4px 0; display:flex; gap:8px; flex-wrap:wrap;">
  <button onclick="sendPrompt('Add a features/cards section below the EFF-HUB hero with icons for each nav item')" style="font-size:12px;">Add cards section ↗</button>
  <button onclick="sendPrompt('Change the EFF-HUB color scheme from blue/green to a different palette')" style="font-size:12px;">Try new colors ↗</button>
  <button onclick="sendPrompt('Show me a merged layout combining two websites in this EFF-HUB mockup')" style="font-size:12px;">Merge two sites ↗</button>
</div>
