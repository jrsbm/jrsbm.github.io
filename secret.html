<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFFC Vertical Poster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #0f172a; }
        .poster-canvas {
            width: 450px;
            height: 800px;
            background: #1a1a1a;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        .gold-text { color: #d4af37; }
        .accent-bar { background: #d4af37; height: 4px; width: 60px; margin: 15px auto; }
        .qr-placeholder {
            width: 140px;
            height: 140px;
            background: white;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-10">

    <!-- Information for the user -->
    <div class="mb-6 text-slate-300 text-center max-w-lg">
        <p class="text-sm font-bold uppercase tracking-widest text-blue-400 mb-2">Poster print</p>
    </div>

    <!-- The Poster -->
    <div class="poster-canvas flex flex-col border-4 border-[#333]">
        
        <!-- Header Section -->
        <div class="pt-16 pb-8 px-6 text-center bg-gradient-to-b from-[#222] to-[#1a1a1a]">
            <h1 class="text-4xl font-black uppercase tracking-tighter gold-text leading-none">
                Authentic Food<br>Festival
            </h1>
            <h2 class="text-2xl font-light uppercase tracking-[0.3em] text-white mt-2">
                & Conference
            </h2>
            <div class="accent-bar"></div>
            <p class="text-white font-bold text-lg tracking-widest">27-28 MAY 2026 | DUBLIN</p>
        </div>

        <!-- Graphic Area -->
        <div class="flex-grow flex flex-col items-center justify-center px-8 text-center relative">
            <!-- Background Graphic Circles -->
            <div class="absolute w-64 h-64 bg-yellow-500 opacity-5 rounded-full -top-10 -right-20"></div>
            <div class="absolute w-40 h-40 bg-white opacity-5 rounded-full bottom-20 -left-10"></div>

            <!-- QR Section -->
            <div class="qr-placeholder flex flex-col items-center justify-center mb-8 shadow-2xl z-10">
                        <picture>
                            <img src="QR.jpg" alt="QR-code" style="max-width: 100%; max-height: 100%;">
                        </picture>
            </div>

            <!-- Main Content -->
            <div class="z-10">
                <h3 class="text-2xl font-bold text-white mb-4">Register now!</h3>
                
                <div class="bg-white/5 border border-white/10 rounded-xl p-5 mb-6 backdrop-blur-sm">
                    <p class="text-lg font-bold text-white mb-1">Student rate: €25</p>
                    <p class="text-xs gold-text italic mb-3">(€20 early bird until 31 March 2026)</p>
                    
                    <div class="h-px bg-white/20 w-full mb-3"></div>
                    
                    <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">Contact for Booking</p>
                    <a href="mailto:effcop@ucd.ie" class="text-xl font-bold text-blue-400 underline block">effcop@ucd.ie</a>
                </div>

                <p class="text-[10px] text-slate-500 font-medium leading-relaxed max-w-[250px] mx-auto uppercase tracking-tighter">
                    Proof of registration required for all student rates.
                </p>
            </div>
        </div>

        <!-- Footer -->
        <div class="pb-10 pt-4 text-center">
            <p class="text-[9px] text-slate-600 tracking-[0.4em] uppercase">
                University College Dublin &bull; 2026
            </p>
        </div>
    </div>

    <button onclick="window.print()" class="mt-8 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-full transition-all">
        Save as PDF / Print
    </button>

</body>
</html>
